version: "3"

includes:
  config:
    taskfile: ../config.yml
    flatten: true

vars:
  PATH_CRATE: '{{joinPath .PATH_REPO_ROOT "examples" "bundle-player"}}'
  PATH_DIST: '{{joinPath .PATH_BUILD_ARTIFACTS "bundle-player"}}'

# Single-threaded main-thread embedding on the stable toolchain (the
# player-tests shape): no THREADED_RUSTFLAGS, no COOP/COEP headers — plain
# CORS covers the bundle fetches from the test-scenes server on :9084.

tasks:
  dev:
    desc: "bundle-player: trunk serve on :{{.PORT_BUNDLE_PLAYER_DEV}} (expects `task test-scenes` on :{{.PORT_TEST_SCENES_DEV}} for the bundles)"
    cmds:
      - >
        cd {{.PATH_CRATE}} &&
        trunk serve --port {{.PORT_BUNDLE_PLAYER_DEV}}
        --watch "{{.PATH_CRATE}}"
        --watch "{{.PATH_CRATE_RENDERER}}"
        --watch "{{.PATH_CRATE_RENDERER_CORE}}"
        --watch "{{joinPath .PATH_CRATES "scene"}}"
        --watch "{{joinPath .PATH_CRATES "scene-loader"}}"

  build:
    desc: "bundle-player: production build"
    cmds:
      - rm -rf {{joinPath .PATH_CRATE "dist"}}
      - rm -rf {{.PATH_DIST}}
      - cd {{.PATH_CRATE}} && trunk build --release --public-url "/"
      - mkdir -p {{.PATH_DIST}}
      - cp -r {{joinPath .PATH_CRATE "dist"}}/* {{.PATH_DIST}}/

  check:
    desc: "bundle-player: cargo check for wasm (no serve)"
    cmds:
      - cd {{.PATH_CRATE}} && cargo check --target wasm32-unknown-unknown

  clean:
    desc: "bundle-player: remove dist + .build-artifacts output"
    cmds:
      - rm -rf {{joinPath .PATH_CRATE "dist"}}
      - rm -rf {{.PATH_DIST}}
