version: "3"

vars:
  # Paths
  PATH_REPO_ROOT:
    sh: git rev-parse --show-toplevel
  PATH_BUILD_ARTIFACTS: '{{joinPath .PATH_REPO_ROOT ".build-artifacts"}}'
  PATH_PACKAGES: '{{joinPath .PATH_REPO_ROOT "packages"}}'
  PATH_CRATES: '{{joinPath .PATH_PACKAGES "crates"}}'
  PATH_FRONTENDS: '{{joinPath .PATH_PACKAGES "frontend"}}'
  PATH_CRATE_RENDERER: '{{joinPath .PATH_CRATES "renderer"}}'
  PATH_CRATE_RENDERER_CORE: '{{joinPath .PATH_CRATES "renderer-core"}}'
  PATH_CRATE_MATERIALS: '{{joinPath .PATH_CRATES "materials"}}'
  PATH_CRATE_WEB_SHARED: '{{joinPath .PATH_FRONTENDS "web-shared"}}'
  PATH_FRONTEND_EDITOR: '{{joinPath .PATH_FRONTENDS "editor"}}'
  PATH_MEDIA_LOCAL: '{{joinPath .PATH_REPO_ROOT "media"}}'
  # The sibling awsm-test-assets repo (dir name `test-assets`). Its files are
  # served locally in dev (port 9083) and from cdn.awsm.fun/test-assets in prod.
  PATH_MEDIA_ADDITIONAL_ASSETS: '{{joinPath .PATH_REPO_ROOT ".." "test-assets"}}'
  PATH_CLOUDFLARE: '{{joinPath .PATH_REPO_ROOT "cloudflare"}}'
  PATH_CLOUDFLARE_EDITOR: '{{joinPath .PATH_CLOUDFLARE "editor"}}'
  PATH_CLOUDFLARE_MODEL_TESTS: '{{joinPath .PATH_CLOUDFLARE "model-tests"}}'

  # Ports
  PORT_MODEL_TESTS_DEV: 9080
  PORT_MEDIA_LOCAL_DEV: 9082
  PORT_MEDIA_ADDITIONAL_ASSETS_DEV: 9083
  PORT_TEST_SCENES_DEV: 9084 # `task test-scenes` — serves examples/test-scenes (projects + baked bundles + goldens)
  PORT_EDITOR_DEV: 9085
  PORT_MCP_HTTP_DEV: 9086 # TCP — rmcp /mcp + the editor link + control surface. The "prod" default: baked into editor builds (URL_MCP_DEFAULT) so deployed editors dial here.
  PORT_MCP_HTTP_LOCAL_DEV: 9186 # Dedicated port for `task mcp-dev` so a local dev MCP server never collides with a prod one on 9086. Override: `task mcp-dev -- <port>`.
  PORT_MULTITHREADED_DEV: 9090 # threaded reference app (COOP/COEP, shared memory)

  # URLs — dev (served by the per-frontend dev recipes + media servers)
  URL_DEV_MODEL_TESTS: "http://localhost:{{.PORT_MODEL_TESTS_DEV}}"
  URL_DEV_EDITOR: "http://localhost:{{.PORT_EDITOR_DEV}}"
  # The default MCP server origin the editor dials out to (always local; the
  # server is a local dev tool). Baked into the editor build + the button default.
  URL_MCP_DEFAULT: "http://127.0.0.1:{{.PORT_MCP_HTTP_DEV}}"
  URL_DEV_MEDIA_BASE_URL_GLTF_SAMPLES: "http://localhost:{{.PORT_MEDIA_LOCAL_DEV}}/glTF-Sample-Assets/Models"
  URL_DEV_MEDIA_BASE_URL_ADDITIONAL_ASSETS: "http://localhost:{{.PORT_MEDIA_ADDITIONAL_ASSETS_DEV}}"

  # URLs — production. The scene editor and model tester are now two distinct
  # Cloudflare Pages sites, each served at the ROOT of its own subdomain
  # (no shared subpath), so neither needs a base-URI prefix anymore.
  URL_PROD_EDITOR: "https://scene.awsm.fun"
  URL_PROD_MODEL_TESTS: "https://model-tests.awsm.fun"
  URL_PROD_MEDIA_BASE_URL_GLTF_SAMPLES: "https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/refs/heads/main/Models"
  URL_PROD_MEDIA_BASE_URL_ADDITIONAL_ASSETS: "https://cdn.awsm.fun/test-assets"

  # Trunk public-URL prefix. Both production sites are served at their domain
  # root, so the prod base path is empty just like dev.
  PROD_ROOT_BASE_URI_PATH: ""
  DEV_ROOT_BASE_URI_PATH: ""

  # Cloudflare Pages deploy targets. Custom domains (scene.awsm.fun,
  # model-tests.awsm.fun) are attached to these projects in the Cloudflare
  # dashboard; the deploy tasks only push builds to the projects.
  CLOUDFLARE_PAGES_PROJECT_EDITOR: "awsm-scene-editor"
  CLOUDFLARE_PAGES_PROJECT_MODEL_TESTS: "awsm-renderer-model-tests"
  CLOUDFLARE_PAGES_BRANCH: "main"
