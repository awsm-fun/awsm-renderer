version: "3"

includes:
  config:
    taskfile: ../config.yml
    flatten: true

vars:
  PATH_CRATE: '{{joinPath .PATH_FRONTENDS "model-tests"}}'
  PATH_DIST: '{{joinPath .PATH_BUILD_ARTIFACTS "model-tests"}}'

tasks:
  dev:
    desc: "model-tests: trunk serve"
    env:
      MEDIA_BASE_URL_GLTF_SAMPLES: "{{.URL_DEV_MEDIA_BASE_URL_GLTF_SAMPLES}}"
      MEDIA_BASE_URL_ADDITIONAL_ASSETS: "{{.URL_DEV_MEDIA_BASE_URL_ADDITIONAL_ASSETS}}"
      ROOT_BASE_URI_PATH: "{{.DEV_ROOT_BASE_URI_PATH}}"
    cmds:
      - >
        cd {{.PATH_CRATE}} &&
        trunk serve --port {{.PORT_MODEL_TESTS_DEV}}
        --watch "{{.PATH_MEDIA_LOCAL}}"
        --watch "{{.PATH_MEDIA_ADDITIONAL_ASSETS}}"
        --watch "{{.PATH_CRATE}}"
        --watch "{{.PATH_CRATE_RENDERER}}"
        --watch "{{.PATH_CRATE_RENDERER_CORE}}"
        --watch "{{.PATH_CRATE_WEB_SHARED}}"

  build:
    desc: "model-tests: production build (model tester, served at the root of model-tests.awsm.fun)"
    env:
      MEDIA_BASE_URL_GLTF_SAMPLES: "{{.URL_PROD_MEDIA_BASE_URL_GLTF_SAMPLES}}"
      MEDIA_BASE_URL_ADDITIONAL_ASSETS: "{{.URL_PROD_MEDIA_BASE_URL_ADDITIONAL_ASSETS}}"
      ROOT_BASE_URI_PATH: "{{.PROD_ROOT_BASE_URI_PATH}}"
    cmds:
      - rm -rf {{joinPath .PATH_CRATE "dist"}}
      - rm -rf {{.PATH_DIST}}
      - cd {{.PATH_CRATE}} && trunk build --release --public-url "/"
      - mkdir -p {{.PATH_DIST}}
      - cp -r {{joinPath .PATH_CRATE "dist"}}/* {{.PATH_DIST}}/
      - cp {{.PATH_DIST}}/index.html {{.PATH_DIST}}/404.html

  deploy:
    desc: "Build the model tester and deploy it to Cloudflare Pages (project: awsm-renderer-model-tests → model-tests.awsm.fun)"
    deps: ["build"]
    requires:
      vars:
        [
          CLOUDFLARE_DEPLOY_WORKERS_TOKEN,
          CLOUDFLARE_PAGES_PROJECT_MODEL_TESTS,
          CLOUDFLARE_PAGES_BRANCH,
        ]
    env:
      CLOUDFLARE_API_TOKEN: "{{.CLOUDFLARE_DEPLOY_WORKERS_TOKEN}}"
    cmds:
      - task: _cloudflare-ensure-project
        vars:
          CLOUDFLARE_PAGES_PROJECT: "{{.CLOUDFLARE_PAGES_PROJECT_MODEL_TESTS}}"
      - >
        wrangler pages deploy "{{.PATH_DIST}}"
        --project-name="{{.CLOUDFLARE_PAGES_PROJECT_MODEL_TESTS}}"
        --branch "{{.CLOUDFLARE_PAGES_BRANCH}}"

  _cloudflare-ensure-project:
    desc: "Ensure the model-tests Cloudflare Pages project exists"
    internal: true
    requires:
      vars: [CLOUDFLARE_DEPLOY_WORKERS_TOKEN, CLOUDFLARE_PAGES_PROJECT, CLOUDFLARE_PAGES_BRANCH]
    env:
      CLOUDFLARE_API_TOKEN: "{{.CLOUDFLARE_DEPLOY_WORKERS_TOKEN}}"
    cmds:
      - |
        set -euo pipefail
        PROJECT="{{.CLOUDFLARE_PAGES_PROJECT}}"
        if wrangler pages project list --json | jq -e --arg project "$PROJECT" '.[] | select(."Project Name" == $project)' >/dev/null; then
          echo "Cloudflare Pages project exists: $PROJECT"
        else
          wrangler pages project create "$PROJECT" --production-branch "{{.CLOUDFLARE_PAGES_BRANCH}}"
        fi

  clean:
    desc: "model-tests: remove dist + .build-artifacts output"
    cmds:
      - rm -rf {{joinPath .PATH_CRATE "dist"}}
      - rm -rf {{.PATH_DIST}}
