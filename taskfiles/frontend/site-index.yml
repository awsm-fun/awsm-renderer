version: "3"

includes:
  config:
    taskfile: ../config.yml
    flatten: true

vars:
  PATH_CRATE: '{{joinPath .PATH_FRONTENDS "site-index"}}'
  PATH_DIST_LOCAL: '{{joinPath .PATH_FRONTENDS "site-index" "dist"}}'
  PATH_DIST: '{{joinPath .PATH_BUILD_ARTIFACTS "site-index"}}'

tasks:
  build:
    desc: "site-index: render index.html with sibling-relative URLs"
    # The deployed Pages artifact is a single tree with the
    # model-tests + scene-editor builds copied into matching subdirs
    # next to this index.html, so relative URLs work whatever subpath
    # the site is served at (dakom.github.io/awsm-renderer/ in our
    # case; could also be a fork or PR preview without rebuilds).
    env:
      URL_MODEL_TESTS: "model-tests"
      URL_SCENE_EDITOR: "scene-editor"
      URL_MATERIAL_EDITOR: "material-editor"
    cmds:
      - mkdir -p {{.PATH_DIST}}
      - envsubst < {{joinPath .PATH_CRATE "index.template.html"}} > {{.PATH_DIST}}/index.html

  dev-build:
    internal: true
    desc: "site-index: render index.html with dev URLs"
    # Dev frontends sit on their own ports, not under a shared
    # subpath, so the dev landing keeps absolute localhost URLs.
    env:
      URL_MODEL_TESTS: "{{.URL_DEV_MODEL_TESTS}}"
      URL_SCENE_EDITOR: "{{.URL_DEV_SCENE_EDITOR}}"
      URL_MATERIAL_EDITOR: "{{.URL_DEV_MATERIAL_EDITOR}}"
    cmds:
      - mkdir -p {{.PATH_DIST_LOCAL}}
      - envsubst < {{joinPath .PATH_CRATE "index.template.html"}} > {{.PATH_DIST_LOCAL}}/index.html

  dev:
    desc: "site-index: serve the dev landing page"
    deps: [dev-build]
    cmds:
      - >
        cd {{.PATH_DIST_LOCAL}} &&
        http-server --gzip --cors --index -p {{.PORT_SITE_INDEX_DEV}}

  clean:
    desc: "site-index: remove dist + .build-artifacts output"
    cmds:
      - rm -rf {{.PATH_DIST_LOCAL}}
      - rm -rf {{.PATH_DIST}}
