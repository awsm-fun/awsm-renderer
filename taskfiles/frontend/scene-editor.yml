version: "3"

includes:
  config:
    taskfile: ../config.yml
    flatten: true

vars:
  PATH_CRATE: '{{joinPath .PATH_FRONTENDS "scene-editor"}}'
  PATH_DIST: '{{joinPath .PATH_BUILD_ARTIFACTS "scene-editor"}}'

tasks:
  dev:
    desc: "scene-editor: trunk serve"
    # MEDIA_BASE_URL_ADDITIONAL_ASSETS points at the awsm-renderer-assets
    # repo (port 9083 in dev, github.io in prod). The debug-only
    # `load_external_test_scene` wasm export fetches scenes from this
    # URL so test fixtures live in one canonical place instead of being
    # duplicated into the repo tree.
    env:
      ROOT_BASE_URI_PATH: "{{.DEV_ROOT_BASE_URI_PATH}}"
      MEDIA_BASE_URL_ADDITIONAL_ASSETS: "{{.URL_DEV_MEDIA_BASE_URL_ADDITIONAL_ASSETS}}"
      URL_MATERIAL_EDITOR: "{{.URL_DEV_MATERIAL_EDITOR}}"
    cmds:
      - >
        cd {{.PATH_CRATE}} &&
        trunk serve --port {{.PORT_SCENE_EDITOR_DEV}}
        --watch "{{.PATH_CRATE}}"
        --watch "{{.PATH_CRATE_RENDERER}}"
        --watch "{{.PATH_CRATE_RENDERER_CORE}}"
        --watch "{{.PATH_CRATE_SCENE_SCHEMA}}"
        --watch "{{.PATH_CRATE_WEB_SHARED}}"

  build:
    desc: "scene-editor: production build"
    env:
      ROOT_BASE_URI_PATH: "{{.PROD_ROOT_BASE_URI_PATH}}/scene-editor"
      MEDIA_BASE_URL_ADDITIONAL_ASSETS: "{{.URL_PROD_MEDIA_BASE_URL_ADDITIONAL_ASSETS}}"
      URL_MATERIAL_EDITOR: "{{.URL_PROD_MATERIAL_EDITOR}}"
    cmds:
      - rm -rf {{joinPath .PATH_CRATE "dist"}}
      - rm -rf {{.PATH_DIST}}
      - cd {{.PATH_CRATE}} && trunk build --release --public-url "{{.URL_PROD_SCENE_EDITOR}}"
      # `index.html` unconditionally `copy-dir`s the repo-root
      # `assets/world/` tuning scenes (~20 MB) into the dist so the
      # debug-only `load_scene_by_path` helper can fetch them. The
      # consumer is gated on `#[cfg(debug_assertions)]`, so release
      # builds have no code path that reads them — drop them from
      # the deployed tree to keep production lean.
      - rm -rf {{joinPath .PATH_CRATE "dist/assets/world"}}
      - mkdir -p {{.PATH_DIST}}
      - cp -r {{joinPath .PATH_CRATE "dist"}}/* {{.PATH_DIST}}/
      - cp {{.PATH_DIST}}/index.html {{.PATH_DIST}}/404.html

  clean:
    desc: "scene-editor: remove dist + .build-artifacts output"
    cmds:
      - rm -rf {{joinPath .PATH_CRATE "dist"}}
      - rm -rf {{.PATH_DIST}}
