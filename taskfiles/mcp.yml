version: "3"

includes:
  config:
    taskfile: ./config.yml
    flatten: true

tasks:
  serve:
    desc: "MCP server: the /editor WebSocket link the editor dials into + the rmcp /mcp endpoint + the /png byte side-channel + /debug (raw-request seam) + /health."
    cmds:
      - >
        cargo run -p awsm-scene-mcp --
        --port {{.PORT_MCP_HTTP_DEV}}

  build:
    desc: "Build the MCP server binary (debug)."
    cmds:
      - cargo build -p awsm-scene-mcp

  install:
    desc: "Build (release) + install the `awsm-scene-mcp` binary to ~/.cargo/bin so you can run it from anywhere."
    # Optimized release build — the same artifact CI will package + distribute (github-built binaries) later.
    cmds:
      - cargo install --path {{.PATH_PACKAGES}}/mcp --bin awsm-scene-mcp --force
      - 'echo "Installed awsm-scene-mcp to ~/.cargo/bin. Run it from anywhere — bare awsm-scene-mcp uses the default port {{.PORT_MCP_HTTP_DEV}}."'
