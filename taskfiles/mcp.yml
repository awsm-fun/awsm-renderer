version: "3"

includes:
  config:
    taskfile: ./config.yml
    flatten: true

tasks:
  serve:
    desc: "MCP server: WebTransport (QUIC) link the editor dials into + the rmcp /mcp endpoint + /control (cert-hash discovery) + /debug (raw-request seam)."
    cmds:
      - >
        cargo run -p awsm-renderer-mcp --
        --client-port {{.PORT_MCP_HTTP_DEV}}
        --browser-port {{.PORT_MCP_QUIC_DEV}}

  build:
    desc: "Build the MCP server binary (debug)."
    cmds:
      - cargo build -p awsm-renderer-mcp

  install:
    desc: "Build (release) + install the `awsm-renderer-mcp` binary to ~/.cargo/bin so you can run it from anywhere."
    # Optimized release build — the same artifact CI will package + distribute (github-built binaries) later.
    cmds:
      - cargo install --path {{.PATH_PACKAGES}}/mcp --bin awsm-renderer-mcp --force
      - 'echo "Installed awsm-renderer-mcp to ~/.cargo/bin. Run it from anywhere — bare awsm-renderer-mcp uses the default ports {{.PORT_MCP_HTTP_DEV}} (HTTP) / {{.PORT_MCP_QUIC_DEV}} (WebTransport)."'
