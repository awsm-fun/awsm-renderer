<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Basis worker smoke test (compression Phase 1)</title>
    <style>
        body { font-family: ui-monospace, monospace; background: #111; color: #ddd; padding: 2rem; }
        .ok { color: #7dd87d; }
        .fail { color: #ff6b6b; }
    </style>
</head>
<body>
    <h1>Basis worker smoke test</h1>
    <p>Serve the REPO ROOT (so /media is same-origin): <code>npx http-server . -p 9095</code>, open <code>/web/workers/basis-worker-smoke.html</code>.</p>
    <pre id="out">running…</pre>
    <script>
        const out = document.getElementById("out");
        const lines = [];
        function log(cls, msg) {
            lines.push(`<span class="${cls}">${msg}</span>`);
            out.innerHTML = lines.join("\n");
            console.log(`[basis-worker-smoke] ${msg}`);
        }

        const FIXTURE = "/media/glTF-Sample-Assets/Models/ChronographWatch/glTF-KTX-BasisU/khronos_basecolor.ktx2";

        // Cache-buster: Chrome aggressively disk-caches worker scripts.
        const worker = new Worker(`basis-worker.js?dev=${Date.now()}`);
        let nextId = 1;
        const pending = new Map();
        worker.onmessage = (e) => {
            const { id, ok, result, error } = e.data;
            const p = pending.get(id);
            pending.delete(id);
            ok ? p.resolve(result) : p.reject(new Error(`${error.code}: ${error.message}`));
        };
        worker.onerror = (e) => log("fail", `WORKER FATAL: ${e.message}`);
        function request(msg, transfer = []) {
            return new Promise((resolve, reject) => {
                const id = nextId++;
                pending.set(id, { resolve, reject });
                worker.postMessage({ v: 1, id, ...msg }, transfer);
            });
        }

        (async () => {
            try {
                await request({
                    op: "init",
                    urls: {
                        transcoder: new URL("../vendor/basis/basis_transcoder.js", location).href,
                        encoder: new URL("../vendor/basis/basis_encoder.js", location).href,
                    },
                });
                log("ok", "init: transcoder module ready (off main thread)");

                const ktx2 = await (await fetch(FIXTURE)).arrayBuffer();
                log("ok", `fetched fixture ${FIXTURE.split("/").pop()} (${ktx2.byteLength} bytes)`);

                for (const target of ["bc7", "astc-4x4", "rgba32"]) {
                    const t0 = performance.now();
                    // Copy per-target since the buffer transfers to the worker.
                    const r = await request({ op: "transcode", ktx2: ktx2.slice(0), target }, []);
                    const ms = (performance.now() - t0).toFixed(1);
                    const bytes = r.levels.reduce((n, l) => n + l.data.byteLength, 0);
                    log("ok", `transcode → ${target}: ${r.width}×${r.height}, ${r.levels.length} mips, ${bytes} bytes, uastc=${r.isUastc}, alpha=${r.hasAlpha} (${ms}ms)`);
                }

                // Encode roundtrip: 32×32 gradient → ETC1S KTX2 → transcode back.
                const W = 32, H = 32;
                const rgba = new Uint8Array(W * H * 4);
                for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
                    const i = (y * W + x) * 4;
                    rgba[i] = x * 8; rgba[i + 1] = y * 8; rgba[i + 2] = 128; rgba[i + 3] = 255;
                }
                const enc = await request(
                    { op: "encode", rgba: rgba.buffer, width: W, height: H, uastc: false, srgb: true, mipmaps: true, quality: 190 },
                    [rgba.buffer]
                );
                log("ok", `encode: ${W}×${H} RGBA → ETC1S KTX2, ${enc.ktx2.byteLength} bytes`);
                const back = await request({ op: "transcode", ktx2: enc.ktx2, target: "rgba32" }, [enc.ktx2]);
                const l0 = new Uint8Array(back.levels[0].data);
                const probe = (x, y) => l0[(y * W + x) * 4];
                if (back.width !== W || back.levels.length < 2) throw new Error("encode roundtrip: bad dims/mips");
                if (!(probe(31, 0) > probe(0, 0))) throw new Error("encode roundtrip: gradient lost");
                log("ok", `encode→transcode roundtrip: ${back.levels.length} mips, gradient preserved (R ${probe(0,0)}→${probe(31,0)})`);

                log("ok", "PHASE-1 BASIS EXIT: PASS — worker transcodes + encodes off the main thread");
            } catch (e) {
                log("fail", `PHASE-1 BASIS EXIT: FAIL — ${e.message}`);
                console.error(e);
            }
        })();
    </script>
</body>
</html>
