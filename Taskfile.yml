version: "3"

silent: true

dotenv: [".env"]

includes:
  config:
    taskfile: ./taskfiles/config.yml
    flatten: true
  editor:
    taskfile: ./taskfiles/frontend/editor.yml
  model-tests:
    taskfile: ./taskfiles/frontend/model-tests.yml
  mcp:
    taskfile: ./taskfiles/mcp.yml
  mt:
    taskfile: ./taskfiles/examples/multithreaded.yml
  debug-mobile:
    taskfile: ./taskfiles/debugging/mobile.yml

tasks:
  default:
    desc: "List all tasks"
    cmds:
      - task --list-all

  dev:
    desc: "Run every frontend dev server in parallel plus the media servers"
    deps:
      - editor:dev
      - model-tests:dev
      - media-local
      - media-additional-assets

  editor-dev:
    desc: "Run the unified editor dev server in parallel plus the media servers"
    deps:
      - editor:dev
      - media-local
      - media-additional-assets

  mcp-dev:
    desc: "Editor + MCP server (+ media) for LOCAL renderer/MCP dev. The MCP server runs on a dedicated dev port (9186), NOT the prod default (9086) that deployed editors dial into — so it never conflicts with a live production MCP server. This editor's connect button defaults straight to the dev port, so plain http://localhost:9085 attaches (no ?mcp= needed). Pass a custom port with `task mcp-dev -- <port>`."
    vars:
      MCP_PORT: '{{.CLI_ARGS | default .PORT_MCP_HTTP_LOCAL_DEV}}'
    deps:
      - task: editor:dev
        vars:
          MCP_ORIGIN: "http://127.0.0.1:{{.MCP_PORT}}"
      - media-local
      - media-additional-assets
      - task: mcp:serve
        vars:
          MCP_PORT: "{{.MCP_PORT}}"

  model-tests-dev:
    desc: "Run model-tests dev server in parallel plus the media servers"
    deps:
      - model-tests:dev
      - media-local
      - media-additional-assets

  build:
    desc: "Build every frontend for production into .build-artifacts/"
    cmds:
      - task: editor:build
      - task: model-tests:build

  deploy:
    desc: "Deploy both frontends to Cloudflare Pages (scene editor → scene.awsm.fun, model tester → model-tests.awsm.fun)"
    cmds:
      - task: editor:deploy
      - task: model-tests:deploy

  clean:
    desc: "Remove every frontend's dist + .build-artifacts output"
    cmds:
      - task: editor:clean
      - task: model-tests:clean

  media-local:
    internal: true
    desc: "Local media server (glTF samples + assets watched by model-tests)"
    cmds:
      - >
        cd {{.PATH_MEDIA_LOCAL}} &&
        http-server --cors -p {{.PORT_MEDIA_LOCAL_DEV}}

  media-additional-assets:
    internal: true
    desc: "Additional-assets media server"
    cmds:
      - >
        cd {{.PATH_MEDIA_ADDITIONAL_ASSETS}} &&
        http-server --cors -p {{.PORT_MEDIA_ADDITIONAL_ASSETS_DEV}}

  test-scenes:
    desc: "Serve examples/test-scenes (the permanent verification suite: saved projects + baked bundles + goldens) on :{{.PORT_TEST_SCENES_DEV}}. Load a project in the editor via load_project_from_url http://localhost:{{.PORT_TEST_SCENES_DEV}}/<scene>/project; player bundles live at /<scene>/bundle."
    cmds:
      - >
        cd {{joinPath .PATH_REPO_ROOT "examples/test-scenes"}} &&
        http-server --cors -p {{.PORT_TEST_SCENES_DEV}}

  lint:
    desc: "Run the exact lints CI runs (rustfmt + clippy with -D warnings, all features, tests). Mirrors .github/workflows/test.yml."
    cmds:
      - cargo fmt --all -- --check
      - cargo clippy --all --all-features --tests -- -D warnings

  bump:
    desc: "Set [workspace.package].version + the internal awsm-* dep version reqs to <version>, then refresh Cargo.lock — files only, NO git/tag/publish. Idempotent: re-running at the same version makes no diff (safe to call from `publish`). Usage: task bump -- <version>"
    vars:
      VERSION: "{{.CLI_ARGS}}"
    preconditions:
      - sh: 'test -n "{{.VERSION}}"'
        msg: "No version given. Usage: task bump -- <version>   (e.g. task bump -- 0.3.0)"
    cmds:
      # 1. The package version (members inherit it via `version.workspace = true`).
      #    Scoped to the [workspace.package] block so it never touches another
      #    section's `version` (the range ends at the next `[`-header).
      - sed -i.bak -E '/^\[workspace\.package\]/,/^\[/ s/^version = "[^"]*"/version = "{{.VERSION}}"/' Cargo.toml
      # 2. The internal awsm-* dependency version reqs in [workspace.dependencies],
      #    kept in lockstep so the published crates require each other at the
      #    matching version (crates.io rejects path-only deps).
      - sed -i.bak -E '/^awsm-[a-z-]+ = \{ path =/ s/version = "[^"]*"/version = "{{.VERSION}}"/' Cargo.toml
      - rm -f Cargo.toml.bak
      # Refresh Cargo.lock so members' recorded versions match (and sanity-build).
      - cargo check --workspace --quiet

  publish:
    desc: "Release <version> end-to-end: bump → commit (only if needed) → tag → publish the library crates → deploy both frontends → push branch + tag. Pushing the tag triggers the cargo-dist awsm-renderer-scene-mcp binary release on CI. Usage: task publish -- <version>"
    vars:
      VERSION: "{{.CLI_ARGS}}"
    preconditions:
      - sh: 'test -n "{{.VERSION}}"'
        msg: "No version given. Usage: task publish -- <version>   (e.g. task publish -- 0.3.0)"
      - sh: "git diff --quiet && git diff --cached --quiet"
        msg: "Working tree is dirty — commit or stash before releasing."
    cmds:
      - echo "▶ Releasing v{{.VERSION}} …"
      # 1. Ensure the version is set (idempotent — no-op if a PR already bumped it).
      - task: bump
        vars:
          VERSION: "{{.VERSION}}"
      # 2. Commit the bump ONLY if it changed anything (a tree already at this
      #    version produces no diff → no release commit).
      - |
        if git diff --quiet -- Cargo.toml Cargo.lock; then
          echo "  Already at v{{.VERSION}} (bumped earlier) — no release commit needed."
        else
          git add Cargo.toml Cargo.lock
          git commit -m "Release v{{.VERSION}}"
        fi
      # 3. Tag (annotated). Pushing this tag triggers the cargo-dist MCP-server
      #    release on CI (.github/workflows/release.yml). Idempotent like the
      #    commit above: if the tag already exists (a re-run after a partial
      #    release — e.g. crates.io rate-limited mid-publish), keep it and move on.
      - task: tag
        vars:
          VERSION: "{{.VERSION}}"
      # 4. Publish the library crates to crates.io (the explicit, ordered set).
      - task: crates-publish
      # 5. Deploy both frontends to Cloudflare Pages (scene editor + model tester).
      - task: deploy
      # 6. Push the branch (no-op if up to date) + the new tag — pushing the tag
      #    triggers the cargo-dist MCP-server binary release on CI.
      - git push
      - git push origin "v{{.VERSION}}"
      - echo "✅ v{{.VERSION}} — crates published, frontends deployed, tag pushed (MCP binary release building on CI)."

  tag:
    desc: "Create the annotated tag v<version> locally (no push). Idempotent — keeps an existing tag. Usage: task tag -- <version>"
    requires:
      vars: [VERSION]
    cmds:
      - |
        if git rev-parse -q --verify "refs/tags/v{{.VERSION}}" >/dev/null; then
          echo "  Tag v{{.VERSION}} already exists — keeping it (resuming a partial release)."
        else
          git tag -a "v{{.VERSION}}" -m "v{{.VERSION}}"
        fi

  tag-publish:
    desc: "Force-(re)tag v<version> at the CURRENT commit and push it, firing the cargo-dist MCP/LOD binary build on CI. Use this to rebuild binaries from your latest code: unlike `publish` (a real versioned release), it MOVES an existing tag to HEAD and force-pushes so CI always re-runs even if that version was already tagged. NOTE: it's `tag-publish` (one task, hyphen) — `task tag publish` is two tasks and silently does nothing. Usage: task tag-publish -- <version>"
    vars:
      VERSION: "{{.CLI_ARGS}}"
    preconditions:
      - sh: 'test -n "{{.VERSION}}"'
        msg: "No version given. Usage: task tag-publish -- <version>   (e.g. task tag-publish -- 0.7.2)"
    cmds:
      # 1. (Re)create the annotated tag at the CURRENT commit. `-f` MOVES it to
      #    HEAD if it already exists — so the CI build reflects your latest code.
      #    (This is deliberately NOT the idempotent `tag` task, which keeps an
      #    existing tag pointing at its old commit for resuming a partial `publish`.)
      - git tag -f -a "v{{.VERSION}}" -m "v{{.VERSION}}"
      # 2. Push the branch, then FORCE-push the tag. Force is required: if the tag
      #    was already on origin, a plain push is a no-op and CI never fires.
      #    Pushing the tag is what triggers .github/workflows/release.yml.
      - git push
      - git push -f origin "v{{.VERSION}}"
      - echo "✅ v{{.VERSION}} tag (re)pushed at $(git rev-parse --short HEAD) — MCP/LOD binary build running on CI."

  crates-publish:
    desc: "Publish the 13 awsm-renderer library crates to crates.io (dependency-ordered)."
    cmds:
      - task: _crates-publish
        vars:
          PUBLISH_ARGS: ""

  crates-publish-dry-run:
    desc: "Dry-run the crates.io publish — packages + verifies every crate, uploads nothing."
    cmds:
      - task: _crates-publish
        vars:
          # --allow-dirty tolerates an uncommitted working tree during the dry run.
          PUBLISH_ARGS: "--dry-run --allow-dirty"

  _crates-publish:
    internal: true
    # Explicit list (NOT `--workspace`) so ONLY the intended creator-facing
    # library crates ever go out — a frontend/example/internal member added later
    # can't accidentally publish itself by forgetting `publish = false`. These are
    # exactly the contents of packages/crates/ (all public); everything excluded is
    # `publish = false`: the two frontends (awsm-renderer-editor, awsm-renderer-model-tests),
    # awsm-renderer-web-shared, awsm-renderer-render-worker-example, awsm-renderer-debugging, awsm-renderer-scene-mcp
    # (ships via cargo-dist, not crates.io), and awsm-renderer-editor-protocol (internal
    # editor↔server glue under packages/mcp/).
    #
    # Published one crate at a time, dependency-leaf-first. `cargo publish` waits
    # for crates.io to index each crate before returning, so a dependent's verify
    # always sees its just-published deps. The crates target wasm32 (WebGPU via
    # web-sys), hence --target on the verify.
    #
    # Resumable: before each crate we check the sparse index and SKIP any version
    # already published. A real release can fail partway (crates.io rate-limits new
    # crates), and `cargo publish` itself errors hard on an already-published
    # version rather than skipping it — so re-running `task publish` would otherwise
    # die on the first already-up crate. The skip is disabled under --dry-run so the
    # dry run still packages + verifies every crate.
    cmds:
      - |
        set -eu
        CRATES="awsm-renderer-curves awsm-renderer-geometry awsm-renderer-tangents awsm-renderer-scene awsm-renderer-core awsm-renderer-materials awsm-renderer-particles awsm-renderer-meshgen awsm-renderer awsm-renderer-glb-export awsm-renderer-gltf awsm-renderer-gltf-convert awsm-renderer-lod-bake awsm-renderer-scene-loader"
        # Workspace version (first `version = "…"` inside [workspace.package]).
        VERSION="$(awk '/^\[workspace\.package\]/{f=1} f&&/^version = /{gsub(/[",]/,"");print $3;exit}' Cargo.toml)"
        case "{{.PUBLISH_ARGS}}" in *--dry-run*) DRY=1;; *) DRY=0;; esac
        # Sparse-index path for a crate name (awsm-* → aw/sm/<name>).
        idx_path() {
          n="$1"
          case ${#n} in
            1) printf '1/%s' "$n";;
            2) printf '2/%s' "$n";;
            3) printf '3/%s/%s' "$(printf '%s' "$n" | cut -c1)" "$n";;
            *) printf '%s/%s/%s' "$(printf '%s' "$n" | cut -c1-2)" "$(printf '%s' "$n" | cut -c3-4)" "$n";;
          esac
        }
        for c in $CRATES; do
          if [ "$DRY" = 0 ] && curl -sf "https://index.crates.io/$(idx_path "$c")" 2>/dev/null | grep -qF "\"vers\":\"$VERSION\""; then
            echo "  ✓ $c@$VERSION already on crates.io — skipping."
            continue
          fi
          echo "  ▶ publishing $c@$VERSION …"
          cargo publish -p "$c" --target wasm32-unknown-unknown {{.PUBLISH_ARGS}}
        done
