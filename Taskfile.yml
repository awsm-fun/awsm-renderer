version: "3"

silent: true

dotenv: [".env"]

includes:
  config:
    taskfile: ./taskfiles/config.yml
    flatten: true
  model-tests:
    taskfile: ./taskfiles/frontend/model-tests.yml
  scene-editor:
    taskfile: ./taskfiles/frontend/scene-editor.yml
  site-index:
    taskfile: ./taskfiles/frontend/site-index.yml

tasks:
  default:
    desc: "List all tasks"
    cmds:
      - task --list-all

  dev:
    desc: "Run every frontend dev server in parallel plus the media servers"
    deps:
      - model-tests:dev
      - scene-editor:dev
      - site-index:dev
      - media-local
      - media-additional-assets

  model-tests-dev:
    desc: "Run model-tests dev server in parallel plus the media servers"
    deps:
      - model-tests:dev
      - media-local
      - media-additional-assets

  scene-editor-dev:
    desc: "Run model-tests dev server in parallel plus the media servers"
    deps:
      - scene-editor:dev
      - media-local
      - media-additional-assets

  build:
    desc: "Build every frontend for production into .build-artifacts/"
    cmds:
      - task: model-tests:build
      - task: scene-editor:build
      - task: site-index:build

  clean:
    desc: "Remove every frontend's dist + .build-artifacts output"
    cmds:
      - task: model-tests:clean
      - task: scene-editor:clean
      - task: site-index:clean

  media-local:
    internal: true
    desc: "Local media server (glTF samples + assets watched by model-tests)"
    cmds:
      - >
        cd {{.PATH_MEDIA_LOCAL}} &&
        http-server --cors -p {{.PORT_MEDIA_LOCAL_DEV}}

  media-additional-assets:
    internal: true
    desc: "Additional-assets media server"
    cmds:
      - >
        cd {{.PATH_MEDIA_ADDITIONAL_ASSETS}} &&
        http-server --cors -p {{.PORT_MEDIA_ADDITIONAL_ASSETS_DEV}}

  lint:
    desc: "Run the exact lints CI runs (rustfmt + clippy with -D warnings, all features, tests). Mirrors .github/workflows/test.yml."
    cmds:
      - cargo fmt --all -- --check
      - cargo clippy --all --all-features --tests -- -D warnings

  publish:
    desc: "Publish library crates to crates.io (must be run in order: renderer-core, then renderer, then editor)"
    cmds:
      - echo "Publishing awsm-renderer-core..."
      - cd {{.PATH_CRATE_RENDERER_CORE}} && cargo publish --target wasm32-unknown-unknown
      - echo "Waiting for crates.io to index awsm-renderer-core..."
      - sleep 5
      - echo "Publishing awsm-renderer..."
      - cd {{.PATH_CRATE_RENDERER}} && cargo publish --target wasm32-unknown-unknown
      - echo "Waiting for crates.io to index awsm-renderer..."
      - sleep 5
      - echo "Publishing awsm-renderer-editor..."
      - cd {{.PATH_CRATE_EDITOR}} && cargo publish --target wasm32-unknown-unknown
      - echo "All crates published!"
