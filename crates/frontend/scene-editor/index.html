<!doctype html>
<html>
    <head>
        <meta http-equiv="Content-type" content="text/html; charset=utf-8" />
        <meta name="referrer" content="strict-origin-when-cross-origin" />
        <title>awsm scene editor</title>
        <!--
            Editor-bundled assets (e.g. gizmo.glb). Trunk copies the
            crate-local `assets/` directory into the dist so the editor
            fetches `assets/gizmo.glb` at a path relative to its own
            deploy — no separate media server required at runtime.
        -->
        <link data-trunk rel="copy-dir" href="assets" data-target-path="assets" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <!--
            Inline boot-loader: shown the instant the HTML lands and removed
            by Rust at the top of main() (see awsm-web-shared::util::window::
            remove_boot_loader). This bridges the otherwise-blank window
            between HTML parse and the WASM bundle finishing download +
            compile + bindgen-init. No external resources — must paint
            without waiting on Google Fonts.
        -->
        <style>
            html, body { margin: 0; padding: 0; background: #091222; }
            #boot-loader {
                position: fixed;
                inset: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 1.1rem;
                background: #091222;
                color: #91A3C0;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
                z-index: 9999;
            }
            #boot-loader .ring {
                width: 44px;
                height: 44px;
                border: 3px solid rgba(143, 164, 191, 0.18);
                border-top-color: rgb(114, 245, 255);
                border-radius: 50%;
                animation: boot-spin 0.85s linear infinite;
            }
            #boot-loader .word {
                font-size: 0.78rem;
                letter-spacing: 0.32em;
                text-transform: uppercase;
                opacity: 0.65;
            }
            @keyframes boot-spin { to { transform: rotate(360deg); } }
        </style>
    </head>
    <body>
        <div id="boot-loader">
            <div class="ring"></div>
            <div class="word">Loading</div>
        </div>
    </body>
</html>
