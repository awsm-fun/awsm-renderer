name: pages

on:
  push:
    branches:
      - main

# Ensures that only a single workflow per PR will run at a time.
# Cancels in-progress jobs if new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-pages:
    name: build and package GitHub Pages site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "awsm-renderer"
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install Trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: "latest"

      - name: Install Task
        uses: go-task/setup-task@v1

      # `envsubst` ships with gettext-base; preinstalled on
      # ubuntu-latest at time of writing but cheap to ensure.
      - name: Ensure envsubst is available
        run: sudo apt-get install -y --no-install-recommends gettext-base

      - name: Build every frontend
        # `task build` fans out to model-tests:build + scene-editor:build
        # + site-index:build, writing each into .build-artifacts/<name>/.
        # The trunk builds embed `--public-url
        # https://dakom.github.io/awsm-renderer/<frontend>/` so assets
        # resolve under the Pages subpath.
        run: task build
        env:
          RUSTFLAGS: '--cfg=web_sys_unstable_apis --cfg=getrandom_backend="wasm_js"'

      - name: Assemble the combined Pages tree
        # The deployed site is a single tree:
        #   pages/index.html         (site-index landing)
        #   pages/model-tests/...    (model-tests trunk dist)
        #   pages/scene-editor/...   (scene-editor trunk dist)
        # site-index uses sibling-relative URLs (`model-tests/`,
        # `scene-editor/`) so the same tree deploys cleanly at any
        # Pages subpath without rebuilding.
        run: |
          set -euo pipefail
          rm -rf .build-artifacts/pages
          mkdir -p .build-artifacts/pages
          cp -r .build-artifacts/site-index/. .build-artifacts/pages/
          cp -r .build-artifacts/model-tests  .build-artifacts/pages/model-tests
          cp -r .build-artifacts/scene-editor .build-artifacts/pages/scene-editor
          # GitHub Pages serves 404.html for unknown paths; each
          # trunk frontend already gets one, but the site-index
          # itself wants one too so a typo at the root surfaces the
          # landing page rather than a generic 404.
          cp .build-artifacts/pages/index.html .build-artifacts/pages/404.html

      - name: Upload artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages
          path: ./.build-artifacts/pages

  deploy:
    name: Deploy to GitHub Pages
    needs: build-pages
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
