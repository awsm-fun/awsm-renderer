<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>awsm-renderer — bundle-player (player visual-regression page)</title>
    <style>
        html, body { margin: 0; padding: 0; background: #111; color: #ddd; font-family: system-ui, sans-serif; }
        /* The canvas sits at the exact top-left at its native 800x600 so a
           driver that sizes the viewport to 800x600 screenshots ONLY the
           render — goldens must never contain page chrome. */
        canvas { display: block; }
        /* HUD BELOW the golden capture area (y >= 600), never over the canvas. */
        #hud { position: fixed; top: 608px; left: 8px; font-size: 12px; white-space: pre; opacity: 0.9; pointer-events: none; }
    </style>
</head>
<body>
    <div id="hud">bundle-player: booting…</div>
    <link data-trunk rel="rust" data-wasm-opt="0" />
    <!-- Vendored Basis TRANSCODER only (runtime KTX2 load). The encoder is
         editor-only — never copy it here. See web/vendor/basis/README.md. -->
    <link data-trunk rel="copy-file" href="../../web/vendor/basis/basis_transcoder.js" data-target-path="vendor/basis" />
    <link data-trunk rel="copy-file" href="../../web/vendor/basis/basis_transcoder.wasm" data-target-path="vendor/basis" />
    <link data-trunk rel="copy-file" href="../../web/workers/basis-worker.js" data-target-path="workers" />
</body>
</html>
