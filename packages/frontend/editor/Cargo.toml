[package]
name = "awsm-editor"
publish = false  # frontend app, not released to crates.io
description = "Unified scene + material authoring tool for awsm-renderer (v2 rebuild)."
edition.workspace = true
version.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true

# v2 blank-slate rebuild. Dependencies are added back milestone-by-milestone as
# each feature pulls the engine in deliberately (see docs/plans/editor-rewrite.md
# §1). M0 only needs the design-system + dominator to mount an empty shell; the
# renderer / materials / gltf / fs deps return in M1–M3. The archived
# `bad-editor-whoopsie` crate (out of the workspace) carries the full set as a
# code reference.
[dependencies]
awsm-web-shared = { workspace = true }

anyhow = { workspace = true }
tracing = { workspace = true }
wasm-bindgen = { workspace = true }
wasm-bindgen-futures = { workspace = true }

dominator = "0.5.38"
futures-signals = "0.3.34"
