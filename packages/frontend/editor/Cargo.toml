[package]
name = "awsm-editor"
publish = false  # frontend app, not released to crates.io
description = "Unified scene + material authoring tool for awsm-renderer (v2 rebuild)."
edition.workspace = true
version.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true

[features]
default = []
# Opt-in memory/recovery hardening diagnostics (extra `get_memory_stats`
# counters: wasm_heap_bytes, undo/redo len+bytes; oversized-allocation guard).
# Always on in debug builds via `debug_assertions`; this flag turns them on in a
# release build for a soak without otherwise changing the release default.
harden-diag = []

[dependencies]
awsm-curves = { workspace = true, features = ["serde"] }
awsm-meshgen = { workspace = true, features = ["authoring"] }
awsm-glb-export = { workspace = true }
awsm-materials = { workspace = true }
awsm-particles = { workspace = true, features = ["serde"] }
awsm-renderer = { workspace = true, features = ["ktx", "serde", "texture-export", "debug-views", "dynamic-material-validation"] }
awsm-renderer-core = { workspace = true }
awsm-renderer-gltf = { workspace = true }
awsm-scene-loader = { workspace = true }
awsm-editor-protocol = { workspace = true }
awsm-web-shared = { workspace = true }

anyhow = { workspace = true }
glam = { workspace = true, features = ["serde"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
uuid = { version = "1.11.0", features = ["v4", "serde", "js"] }
wasm-bindgen = { workspace = true }
wasm-bindgen-futures = { workspace = true }
js-sys = { workspace = true }
futures = { workspace = true }
indexmap = { workspace = true }

# Frontend-only — not in the awsm workspace deps, mirror what
# `model-tests` and `web-shared` pull directly.
bitcode = { version = "0.6.9", features = ["serde", "uuid"] }
base64 = "0.22"
url = "2"
dominator = "0.5.38"
futures-signals = "0.3.34"
gloo-events = "0.2.0"
gloo-net = { version = "0.6.0", features = ["http", "websocket"] }
gloo-render = "0.2.0"
gloo-timers = { version = "0.3.0", features = ["futures"] }
serde-wasm-bindgen = "0.6.5"
xutex = "0.2.1"
# Content-hashing for asset dedup + collision-free on-disk paths.
sha2 = "0.10.8"
awsm_web = { version = "0.45.0", default-features = false, features = ["dom", "file"] }
# Raster decode for gltf-extracted textures.
image = { version = "0.25.10", default-features = false, features = ["png", "jpeg"] }
# Parse glTF documents at editor-import time.
gltf = { workspace = true }
# TOML project directory persistence.
toml = "0.8"

# web-sys features additive on top of the awsm workspace baseline.
[dependencies.web-sys]
workspace = true
features = [
    "CanvasRenderingContext2d",
    "DirectoryPickerOptions",
    "FileSystemHandle",
    "FileSystemHandleKind",
    "FileSystemPermissionMode",
    "FileSystemHandlePermissionDescriptor",
    "FileSystemDirectoryHandle",
    "FileSystemFileHandle",
    "FileSystemWritableFileStream",
    "FileSystemGetDirectoryOptions",
    "FileSystemGetFileOptions",
    "FileSystemRemoveOptions",
    "FileSystemCreateWritableOptions",
    "KeyboardEvent",
    "Blob",
    "File",
    "Url",
    "BroadcastChannel",
    "MessageEvent",
    # navigator().clipboard().write_text() — the help modal's copy buttons.
    "Clipboard",
]
