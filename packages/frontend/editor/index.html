<!doctype html>
<html>
    <head>
        <meta http-equiv="Content-type" content="text/html; charset=utf-8" />
        <meta name="referrer" content="strict-origin-when-cross-origin" />
        <title>AwsmRenderer — Editor</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <!-- JetBrains Mono for code + tabular numerics; system-ui carries the chrome. -->
        <link
            href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <!--
            Inline boot-loader: shown the instant the HTML lands and removed by
            Rust at the top of main() (awsm-renderer-web-shared::util::window::
            remove_boot_loader). Bridges the blank window between HTML parse and
            the WASM bundle finishing download + compile + bindgen-init. No
            external resources — must paint without waiting on Google Fonts.
        -->
        <style>
            html, body { margin: 0; padding: 0; background: oklch(0.155 0.006 255); }
            #boot-loader {
                position: fixed;
                inset: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 1.1rem;
                background: oklch(0.155 0.006 255);
                color: oklch(0.560 0.007 255);
                font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
                z-index: 9999;
            }
            #boot-loader .ring {
                width: 44px;
                height: 44px;
                border: 3px solid oklch(0.560 0.007 255 / 0.18);
                border-top-color: #5b8dd6;
                border-radius: 50%;
                animation: boot-spin 0.85s linear infinite;
            }
            #boot-loader .word {
                font-size: 0.78rem;
                letter-spacing: 0.32em;
                text-transform: uppercase;
                opacity: 0.65;
            }
            @keyframes boot-spin { to { transform: rotate(360deg); } }
            @keyframes mcp-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }
            /* Watch-it-work: a new feed entry slides up + fades in. */
            @keyframes feed-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        </style>
    </head>
    <body>
        <div id="boot-loader">
            <div class="ring"></div>
            <div class="word">Loading</div>
        </div>
        <!-- Vendored Basis codec modules (see web/vendor/basis/README.md).
             Editor carries BOTH transcoder (import preview / runtime) and
             encoder (bake) — the encoder pair is editor-only by design. -->
        <link data-trunk rel="copy-file" href="../../../web/vendor/basis/basis_transcoder.js" data-target-path="vendor/basis" />
        <link data-trunk rel="copy-file" href="../../../web/vendor/basis/basis_transcoder.wasm" data-target-path="vendor/basis" />
        <link data-trunk rel="copy-file" href="../../../web/vendor/basis/basis_encoder.js" data-target-path="vendor/basis" />
        <link data-trunk rel="copy-file" href="../../../web/vendor/basis/basis_encoder.wasm" data-target-path="vendor/basis" />
        <link data-trunk rel="copy-file" href="../../../web/workers/basis-worker.js" data-target-path="workers" />
    </body>
</html>
