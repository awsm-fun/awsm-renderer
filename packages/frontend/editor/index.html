<!doctype html>
<html>
    <head>
        <meta http-equiv="Content-type" content="text/html; charset=utf-8" />
        <meta name="referrer" content="strict-origin-when-cross-origin" />
        <title>AwsmRenderer — Editor</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <!-- JetBrains Mono for code + tabular numerics; system-ui carries the chrome. -->
        <link
            href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <!--
            Inline boot-loader: shown the instant the HTML lands and removed by
            Rust at the top of main() (awsm-web-shared::util::window::
            remove_boot_loader). Bridges the blank window between HTML parse and
            the WASM bundle finishing download + compile + bindgen-init. No
            external resources — must paint without waiting on Google Fonts.
        -->
        <style>
            html, body { margin: 0; padding: 0; background: oklch(0.155 0.006 255); }
            #boot-loader {
                position: fixed;
                inset: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 1.1rem;
                background: oklch(0.155 0.006 255);
                color: oklch(0.560 0.007 255);
                font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
                z-index: 9999;
            }
            #boot-loader .ring {
                width: 44px;
                height: 44px;
                border: 3px solid oklch(0.560 0.007 255 / 0.18);
                border-top-color: #5b8dd6;
                border-radius: 50%;
                animation: boot-spin 0.85s linear infinite;
            }
            #boot-loader .word {
                font-size: 0.78rem;
                letter-spacing: 0.32em;
                text-transform: uppercase;
                opacity: 0.65;
            }
            @keyframes boot-spin { to { transform: rotate(360deg); } }
        </style>
        <!--
            Editor-bundled assets (e.g. gizmo.glb). Trunk copies the crate-local
            `assets/` directory into the dist so the editor fetches
            `assets/gizmo.glb` at a path relative to its own origin.
        -->
        <link data-trunk rel="copy-dir" href="assets" data-target-path="assets" />
    </head>
    <body>
        <div id="boot-loader">
            <div class="ring"></div>
            <div class="word">Loading</div>
        </div>
    </body>
</html>
