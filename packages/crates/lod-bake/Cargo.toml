[package]
name = "awsm-renderer-lod-bake"
description = "Offline LOD bake over plain geometry arrays (pure Rust, no GPU, wasm-safe) — boundary-locked half-edge QEM simplification shared by the discrete-LOD chain and the cluster-LOD DAG"
edition.workspace = true
version.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
repository.workspace = true

[features]
# Derive serde on the bundle-facing manifest types so the editor bake can write
# them and the scene-loader runtime can read them. The simplifier itself needs
# no serialization.
serde = ["dep:serde"]

[dependencies]
glam = { workspace = true }
serde = { workspace = true, features = ["derive"], optional = true }

[dev-dependencies]
