[package]
name = "awsm-scene-schema"
description = "Authored scene shape consumed by the awsm-renderer editor + runtime."
edition.workspace = true
version.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true

[dependencies]
glam = { workspace = true, features = ["serde"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true, optional = true }
uuid = { version = "1.11.0", features = ["v4", "serde", "js"] }
thiserror = { workspace = true }

[features]
# Native filesystem `load_material_folder`. Off by default so the wasm
# build (which has no std::fs) doesn't pay a code-size cost. The
# `scene-editor` / `material-editor` frontends use their own browser-
# side folder readers; native consumers (tests, CLI tools) enable this.
default = []
fs-loader = ["dep:serde_json"]

[dev-dependencies]
serde_json = { workspace = true }
toml = "0.8"
bitcode = { version = "0.6.9", features = ["serde", "uuid"] }
