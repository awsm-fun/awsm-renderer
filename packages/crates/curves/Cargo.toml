[package]
name = "awsm-curves"
description = "Pure CPU curve math (3D paths + 1D parameter curves + curve-aware geometry helpers)"
edition.workspace = true
version.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
repository.workspace = true

[features]
default = []
# Propagates to glam — every public type stores Vec3, which doesn't
# implement Serialize/Deserialize without glam's own `serde` feature on.
serde = ["dep:serde", "glam/serde"]

[dependencies]
glam = {workspace = true}
serde = {workspace = true, optional = true}
