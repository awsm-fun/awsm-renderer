[package]
name = "awsm-meshgen"
description = "Pure CPU mesh generators (primitives + sweep + procedural textures)"
edition.workspace = true
version.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
repository.workspace = true
homepage.workspace = true

[features]
default = []
serde = ["dep:serde", "awsm-curves/serde", "awsm-geometry/serde"]

[dependencies]
awsm-curves = { workspace = true }
awsm-geometry = { workspace = true }
# Modifier-stack evaluation (`modifiers.rs`) consumes the recipe types
# (`ModifierStack`/`MeshBase`/`Modifier`) defined in the scene schema. No cycle:
# scene-schema is pure data and does not depend on meshgen.
awsm-scene-schema = { workspace = true }
glam = {workspace = true}
serde = {workspace = true, optional = true}
# SDF → triangles (Phase 5). We don't write a mesher — surface nets is delegated
# to this crate (pure Rust, wasm-friendly); our value-add is the SDF distance
# graph in `sdf.rs`.
fast-surface-nets = "0.2.1"
ndshape = "0.3.0"
