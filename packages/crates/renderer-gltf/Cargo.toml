[package]
name = "awsm-renderer-gltf"
description = "glTF ingestion for awsm-renderer"
readme = "README.md"
edition.workspace = true
version.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
repository.workspace = true

[package.metadata.docs.rs]
default-target = "wasm32-unknown-unknown"
rustc-args = ["--cfg=web_sys_unstable_apis"]
rustdoc-args = ["--cfg=web_sys_unstable_apis"]

[features]
default = []

[dependencies]
awsm-renderer = { workspace = true }
awsm-renderer-core = { workspace = true, features = ["texture-pool", "image"] }
awsm-renderer-materials = { workspace = true }
gltf = { workspace = true }
gloo-net = { workspace = true }
web-sys = { workspace = true }
wasm-bindgen = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
futures = { workspace = true }
slotmap = { workspace = true }
glam = { workspace = true }
strum = { workspace = true }
ordered-float = { workspace = true }
indexmap = { workspace = true }
# Tangent generation is delegated to the shared awsm-renderer-tangents crate; the
# byte-buffer reference impl (test-only byte-identity guard) still needs
# bevy_mikktspace, so it moved to dev-dependencies.
awsm-renderer-tangents = { workspace = true }
serde = { workspace = true }
# `serde_bytes` opts `Vec<u8>` fields into serde's `serialize_bytes`
# path — serde_wasm_bindgen turns those into `Uint8Array`s in one
# memcpy instead of iterating element-by-element into a giant JS
# `Array<Number>`. Critical for the worker-mode GltfParseJob payload
# crossing postMessage (Phase 4.3b A/B; see PERFORMANCE.md §5c).
serde_bytes = "0.11"
serde-wasm-bindgen = { workspace = true }

[dev-dependencies]
# Phase-2b byte-identity proptests: the mesh_pack delegation vs the retained
# reference writers (visibility + transparency).
proptest = { workspace = true }
# Used only by the test-only reference tangent impl (byte-identity guard).
bevy_mikktspace = { workspace = true }
