[package]
name = "awsm-editor-protocol"
description = "Shared, serializable command/query wire types for driving the awsm-renderer editor remotely (the MCP WebSocket transport) and from headless tests."
edition.workspace = true
version.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true

[dependencies]
awsm-scene = { workspace = true }
# Recipe types (ModifierStack/Modifier/…) the commands carry — meshgen owns them.
awsm-meshgen = { workspace = true, features = ["recipes"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
# Optional: JSON Schemas for strongly-typed MCP tool params (e.g. VertexPredicate).
schemars = { version = "1", optional = true }

[features]
default = []
# Derive JSON Schemas (chains awsm-scene's + meshgen's recipe schemas). MCP server.
schemars = ["dep:schemars", "awsm-scene/schemars", "awsm-meshgen/schemars"]

[dev-dependencies]
# Authoring round-trip tests (EditorProject + the .mesh.bin bitcode side file).
bitcode = { version = "0.6.9", features = ["serde", "uuid"] }
toml = "0.8"
