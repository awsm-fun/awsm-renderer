[package]
name = "awsm-editor-protocol"
description = "Shared, serializable command/query wire types for driving the awsm-renderer editor remotely (MCP/WebTransport transport) and from headless tests."
edition.workspace = true
version.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true

[dependencies]
awsm-scene-schema = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
# Optional: JSON Schemas for strongly-typed MCP tool params (e.g. VertexPredicate).
schemars = { version = "1", optional = true }

[features]
default = []
# Derive JSON Schemas (pulls scene-schema's too). Enabled by the MCP server.
schemars = ["dep:schemars", "awsm-scene-schema/schemars"]
