[package]
name = "awsm-scene"
description = "Lean canonical runtime scene schema (scene.toml + assets/) for the awsm-renderer player. Authoring types live in awsm-editor-protocol."
edition.workspace = true
version.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true

[dependencies]
glam = { workspace = true, features = ["serde"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true, optional = true }
uuid = { version = "1.11.0", features = ["v4", "serde", "js"] }
thiserror = { workspace = true }
# `scene.toml` ser/de — the canonical runtime scene format. Non-optional: the
# editor (wasm) bakes it + the player parses it; toml is pure-Rust, wasm-friendly.
toml = "0.8"
# Optional JSON Schemas so the MCP server can expose strongly-typed tool params.
schemars = { version = "1", optional = true }

[features]
default = []
fs-loader = ["dep:serde_json"]
schemars = ["dep:schemars"]

[dev-dependencies]
bitcode = { version = "0.6.9", features = ["serde", "uuid"] }
serde_json = { workspace = true }
toml = "0.8"
