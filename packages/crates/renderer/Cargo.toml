[package]
name = "awsm-renderer"
description = "awsm-renderer"
readme = "README.md"
edition.workspace = true
version.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
repository.workspace = true

[package.metadata.docs.rs]
default-target = "wasm32-unknown-unknown"
features = ["animation", "ktx", "serde", "mega-texture", "exr", "texture-export", "scene-schema"]
# WebGPU APIs in web-sys require this cfg flag
rustc-args = ["--cfg=web_sys_unstable_apis"]
rustdoc-args = ["--cfg=web_sys_unstable_apis"]

[features]
default = ["animation", "lod"]
all = ["animation", "lod", "awsm-renderer-core/all", "scene-schema"]
# specifics
animation = []
# Level-of-detail (discrete chain + cluster "virtual geometry" / nanite + paging).
# Default-on. With the feature OFF (`--no-default-features`), ALL LOD code is
# compiled out — the `lod`/`cluster_lod` modules, the cluster_lod render pass +
# its per-frame cut/compaction/paging, the discrete-LOD selection, and the
# renderer's cluster upload/paging methods — so a build without LOD pays nothing
# (zero binary + zero per-frame cost). The `RendererFeatures` LOD flags still
# exist for API stability but are inert (nothing reads them) when the feature is
# off. Mirrors the runtime opt-in: `lod` cargo-off ⇒ even setting the flags is a
# no-op.
lod = []
# Compiles the in-shader debug VIEW overlays — global unlit/flat view mode,
# wireframe overlay, and the froxel light-count heatmap — into the material
# shaders. OFF by default so game builds pay nothing: with the feature off the
# `{% if debug.views %}` template gates collapse and the branches never reach
# the compiled WGSL (the `CullParams` debug fields are simply left unread). The
# editor enables this; the per-frame uniform write stays either way (negligible,
# dedup'd) so the runtime setters keep working when the feature is on.
debug-views = []
# Optional features to enable optional parts of awsm-renderer-core
ktx = ["awsm-renderer-core/ktx"]
# `serde` is now a required dep (Phase 4.3a worker jobs need it); the
# feature is retained as a no-op marker so consumers enabling it
# don't break, and forwards the inner serde feature on
# `awsm-renderer-core`.
serde = ["awsm-renderer-core/serde"]
mega-texture = ["awsm-renderer-core/mega-texture"]
exr = ["awsm-renderer-core/exr"]
texture-export = ["awsm-renderer-core/texture-export"]
# Pulls in `awsm-renderer-scene` and compiles the `From<awsm_renderer_scene::*>`
# bridges that convert the on-disk authoring format into the renderer's
# runtime types (`ShadowsConfig`, `LightShadowParams`, `MeshShadowFlags`,
# etc.). Off by default so the renderer stays scene-schema-free for
# non-editor consumers; on for players that load `EditorProject` bundles
# and want one-call conversion.
#
# This is an extension point: new bridges go in feature-gated
# `schema_convert` modules next to each subsystem's runtime structs.
# See the crate-root docs and `shadows::schema_convert` for the pattern.
scene-schema = ["dep:awsm-renderer-scene"]
# Compiles synchronous `naga` WGSL validation of custom (dynamic-WGSL) materials
# at register time, so the editor reports a TRUE compile error in material
# diagnostics instead of a silent `ok` (the deferred GPU compile of the shared
# kernel never attributes its error back to the material — see D2b). OFF by
# default: the player/runtime never authors materials, so it pays nothing for
# `naga` (~hundreds of KB). The editor enables it.
dynamic-material-validation = ["dep:naga"]

[dependencies]
# Optional — only compiled when `dynamic-material-validation` is on (the editor).
# naga is also a dev-dependency (the wgsl_validation test suite), kept separately
# so the existing tests run on a plain `cargo test`.
naga = { version = "28.0.0", features = ["wgsl-in"], optional = true }
awsm-renderer-core = { workspace = true, features = ["texture-pool"] }
awsm-renderer-materials = { workspace = true }
awsm-renderer-scene = { workspace = true, optional = true }
web-sys = {workspace = true}
wasm-bindgen = {workspace = true}
wasm-bindgen-futures = {workspace = true}
tracing = {workspace = true}
thiserror = {workspace = true}
anyhow = {workspace = true}
slotmap = {workspace = true}
glam = {workspace = true}
askama = {workspace = true}
strum = {workspace = true}
ordered-float = {workspace = true}
indexmap = { workspace = true}
# MikkTSpace tangent generation (shared crate) for the raw-mesh upload path.
awsm-renderer-tangents = { workspace = true }
parry3d = "0.28"
# Required unconditionally by the `workers/` module (Phase 4.3a) — job
# Input/Output must be serializable. The legacy optional `serde`
# feature still works as a no-op marker (kept so existing consumers
# enabling it don't break).
serde = { workspace = true }
serde-wasm-bindgen = {workspace = true}
futures = {workspace = true}

[dev-dependencies]
naga = { version = "28.0.0", features = ["wgsl-in"] }
