[package]
name = "awsm-renderer-editor-protocol"
description = "Internal editor↔MCP wire types (EditorCommand/EditorQuery + the WebSocket transport envelope). Shared only by the awsm-renderer-editor frontend and the awsm-renderer-scene-mcp binary — not a public library; lives under packages/mcp/ alongside its server."
edition.workspace = true
version.workspace = true
license.workspace = true
authors.workspace = true
rust-version.workspace = true
# Internal glue between our own binaries (the editor + the MCP server), not a
# creator-facing library — never goes to crates.io.
publish = false

[dependencies]
awsm-renderer-scene = { workspace = true }
# Recipe types (ModifierStack/Modifier/…) the commands carry — meshgen owns them.
awsm-renderer-meshgen = { workspace = true, features = ["recipes"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
# Decode `create_texture` payloads (base64 / `data:` URI) — pure, host-testable.
base64 = { workspace = true }
# Optional: JSON Schemas for strongly-typed MCP tool params (e.g. VertexPredicate).
schemars = { version = "1", optional = true }

[features]
default = []
# Derive JSON Schemas (chains awsm-renderer-scene's + meshgen's recipe schemas). MCP server.
schemars = ["dep:schemars", "awsm-renderer-scene/schemars", "awsm-renderer-meshgen/schemars"]

[dev-dependencies]
# Authoring round-trip tests (EditorProject + the .mesh.bin bitcode side file).
bitcode = { version = "0.6.9", features = ["serde", "uuid"] }
toml = "0.8"
